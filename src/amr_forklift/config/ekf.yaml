# config/ekf.yaml
ekf_filter_node:
  ros__parameters:
    # Genel
    frequency: 10.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true

    # Frame isimleri
    map_frame: map           # (SLAM map->odom üretecek)
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom        # EKF: odom->base_footprint üretir

    # ========= IMU (Madgwick ile fuse edilmiş) =========
    imu0: /imu/data_fused
    imu0_config:             # x y z r p yaw  vx vy vz vroll vpitch vyaw  ax ay az
      [ false, false, false,
        false, false,  true,
        false, false, false,
        false, false,  true,
        false, false, false ]
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
    imu0_differential: false
    imu0_relative: false
    imu0_nodelay: false
    imu0_yaw_offset: 0.0     # IMU frame hizalıysa 0 bırak

    # ========= Wheel Odom (enkoder) =========
    odom0: /wheel_odom
    odom0_config:            # x y z r p yaw  vx  vy  vz vroll vpitch vyaw  ax ay az
      [ false, false, false,
        false, false, false,
         true, false, false,
        false, false,  true,
        false, false, false ]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_nodelay: false

    # (İstersen ileride process_noise_covariance ve
    #  initial_estimate_covariance ekleyebiliriz; şimdilik
    #  varsayılanlar tipik 2D iç mekân için yeterli.)
