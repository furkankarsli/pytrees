controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_base_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_base_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.415
    wheel_radius: 0.075
    require_interface: true

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    enable_odom_tf: true
    open_loop: false
    use_stamped_vel: true
    cmd_vel_timeout: 0.5

    pose_covariance_diagonal : [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.01]

    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 0.5
    linear.x.min_velocity: -0.5
    linear.x.max_acceleration: 1.0
    
    angular.z.max_velocity: 2.0
    angular.z.max_acceleration: 2.0
    linear.x.has_jerk_limits: true
    linear.x.max_jerk: 1.0
    linear.x.min_jerk: -1.0

    angular.z.has_velocity_limits: true
    angular.z.min_velocity: -1.6
    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration: 0.5
    angular.z.min_acceleration: -0.5
    angular.z.has_jerk_limits: true
    angular.z.max_jerk: 2.0
    angular.z.min_jerk: -2.0
