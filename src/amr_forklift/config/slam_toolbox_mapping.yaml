slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # ---- Çözücü ----
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ---- Frames / IO ----
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint   # Kritik düzeltme: TF çakışmasını engellemek için
    scan_topic: /scan
    use_map_saver: true
    mode: mapping

    # ---- Zamanlama / yayın ----
    debug_logging: false
    throttle_scans: 1            # A2 = 10–15 Hz → 1; 18–20 Hz üstü ise 2 deneyebilirsin
    transform_publish_period: 0.05
    map_update_interval: 1.0     # Daha az CPU yükü (Hızlı süreceğiz diye rahatlatıyoruz)
    transform_timeout: 1.5       # Mesaj sırasının çöpe atılmasını (Drop) önler
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # ---- Harita çözünürlüğü ----
    resolution: 0.05             # 5 cm grid (forklift/AGV için iyi denge)

    # ---- Lidar aralığı (A2M12) ----
    min_laser_range: 0.5         # Kritik: Robotun kendi gövdesini (80cm) görmemesi için artırıldı
    max_laser_range: 10.0

    # ---- Hareket/örnekleme filtresi ----
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_time_interval: 0.1  # düşük hızda daha sık eşleşme
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05
    scan_buffer_size: 14
    scan_buffer_maximum_scan_distance: 6.0
    link_match_minimum_response_fine: 0.12
    link_scan_maximum_distance: 1.2

    # ---- Döngü kapatma (loop closure) ----
    do_loop_closing: true
    loop_search_maximum_distance: 4.5      # uzun koridorlara uygun
    loop_match_minimum_chain_size: 12
    loop_match_maximum_variance_coarse: 2.5
    loop_match_minimum_response_coarse: 0.50
    loop_match_minimum_response_fine: 0.60 # koridor simetrisi için eşiği yükselt

    # ---- Korelasyon alanı (fine matching) ----
    correlation_search_space_dimension: 0.35
    correlation_search_space_resolution: 0.02
    correlation_search_space_smear_deviation: 0.10

    # ---- Loop korelasyonu (coarse/fine arama) ----
    loop_search_space_dimension: 5.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ---- Eşleştirici cezaları ----
    distance_variance_penalty: 0.7         # mesafe uyumsuzluğuna daha sert
    angle_variance_penalty: 1.2
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    coarse_search_angle_offset: 0.349      # 20°
    coarse_angle_resolution: 0.0349        # 2°
    fine_search_angle_offset: 0.00349      # 0.2°
    use_response_expansion: true
