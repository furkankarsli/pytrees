amcl:
  ros__parameters:
    # --- Robot hareket modelinin parametreleri (Differential Drive) ---
    alpha1: 0.2         # Rotasyonel gürültü (rotation from rotation)
    alpha2: 0.2         # Çizgisel gürültü (rotation from translation)
    alpha3: 0.2         # Çizgisel gürültü (translation from translation)
    alpha4: 0.2         # Rotasyonel gürültü (translation from rotation)
    alpha5: 0.2         # Geri hareket/ölçüm hatası (used in Omni model; not needed here)

    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # --- Frame ayarları ---
    base_frame_id: "base_link"  # tf ağacında lidar'ın bağlı olduğu baz frame
    odom_frame_id: "odom"            # eklediysen odometry tf'si için frame adı
    global_frame_id: "map"

    # --- Lidar ayarları ---
    scan_topic: "scan"
    laser_model_type: "likelihood_field"  # odometry çok güvenilirse 'likelihood_field' iyidir
    laser_likelihood_max_dist: 2.0
    laser_max_range: 10.0
    laser_min_range: 0.1

    # --- Beam Skipping (gereksiz ışın atlamayı engeller) ---
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

    # --- Parçacık filtre ayarları ---
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    # --- Sensor modeli ayarları (Hit, Short, Max, Random) ---
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1

    # --- Güncelleme eşikleri ---
    update_min_d: 0.25
    update_min_a: 0.2

    # --- Recovery ve düzeltme katsayıları ---
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    # --- Diğer ayarlar ---
    tf_broadcast: true
    transform_tolerance: 1.0
    save_pose_rate: 0.5
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false
    map_topic: "map"

    # --- Başlangıç konumu (eğer map içinde belirlenmişse) ---
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
